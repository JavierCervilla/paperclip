services:
  preview-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - preview-db:/var/lib/postgresql/data
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    restart: unless-stopped
    environment:
      OPENCLAW_GATEWAY_BIND: "0.0.0.0"
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
    volumes:
      - preview-openclaw-config:/home/node/.openclaw
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18789/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  server:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      preview-db:
        condition: service_healthy
      openclaw:
        condition: service_healthy
    environment:
      PORT: "3100"
      SERVE_UI: "true"
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@preview-db:5432/${POSTGRES_DB}
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "https://${PAPERCLIP_DOMAIN}"
      PAPERCLIP_ALLOWED_HOSTNAMES: "${PAPERCLIP_DOMAIN}"
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-staging}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0}
    networks:
      - dokploy-network
    volumes:
      - preview-data:/paperclip
      - preview-claude-auth:/paperclip/.claude

volumes:
  preview-db:
  preview-data:
  preview-openclaw-config:
  preview-claude-auth:

networks:
  dokploy-network:
    external: true
